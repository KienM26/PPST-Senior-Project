{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>

    <link rel="stylesheet" href="{% static 'htmx/doctorportal.css' %}">
</head>

<body class="page">

    <!-- NAVBAR (FULL WIDTH) -->
    <header class="navbar">
        <div class="nav-left">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST Logo">
        </div>

        <nav class="nav-right">
            <a href="{% url 'htmx:doctor_dashboard' %}">Dashboard</a>
            <a href="{% url 'htmx:doctor_create_test' %}">Create Test</a>
            <a href="{% url 'htmx:doctor_test_results' %}">Results</a>
            <a href="{% url 'htmx:doctor_settings' %}">Settings</a>
            <a href="{% url 'htmx:doctor_support' %}" class="nav-active">Support</a>
            <a href="{% url 'htmx:doctor_logout' %}">Logout</a>
        </nav>
    </header>


    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- HERO -->
        <section class="hero">
            <div class="hero-text">
                <h1>The Philadelphia <br> Pointing Span Test</h1>
            </div>

            <div class="hero-image">
                <img src="https://via.placeholder.com/400x250">
            </div>
        </section>

        <!-- IMAGES -->
        <section class="image-row">
            <div class="image-card small">
                <img src="https://via.placeholder.com/300x200">
            </div>

            <div class="image-card large">
                <img src="https://via.placeholder.com/600x200">
            </div>
        </section>

    </main>

</body>

</html>
