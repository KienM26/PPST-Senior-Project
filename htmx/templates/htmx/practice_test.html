{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPST Practice Test</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --theme-color: {{ current_theme.header }};
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #efeded;
            min-height: 100vh;
        }

        .top-bar {
            background: var(--theme-color);
            min-height: 166px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px 120px;
        }

        .logo-wrap {
            position: absolute;
            left: 40px;
            top: 28px;
        }

        .logo-wrap img {
            height: 48px;
            width: auto;
        }

        .speaker-wrap {
            position: absolute;
            right: 40px;
            top: 22px;
        }

        .speaker-wrap img {
            width: 100px;
            height: auto;
        }

        .lang-badge {
            position: absolute;
            right: 14px;
            top: 10px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-badge img {
            width: 34px;
            height: auto;
        }

        .header-title {
            color: white;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            line-height: 1.15;
            margin: 0;
            max-width: 760px;
        }

        .gray-line {
            height: 20px;
            background: #c8c3c3;
        }

        .page-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 72px 20px 40px;
            text-align: center;
        }

        .start-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 360px;
            height: 58px;
            border: 2px solid #6f6a6a;
            border-radius: 14px;
            background: #f3f3f3;
            color: #059bb8;
            font-size: 22px;
            font-weight: 800;
            text-decoration: none;
        }

        .placeholder-row {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .placeholder-box {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            height: 170px;
        }

        .placeholder-small {
            width: 290px;
        }

        .placeholder-large {
            width: 600px;
        }

        .placeholder-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 900px) {
            .header-title {
                font-size: 32px;
            }

            .speaker-wrap img {
                width: 80px;
            }

            .start-btn {
                width: 300px;
            }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="header-title">The Philadelphia Pointing Span Proctored Test</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <a href="{% url 'htmx:selectVoice' %}" class="start-btn">Start Test Now</a>

        <div class="placeholder-row">
            <div class="placeholder-box placeholder-small">
                <img src="{% static 'htmx/images/practice-left.png' %}" alt="Placeholder left image">
            </div>
            <div class="placeholder-box placeholder-large">
                <img src="{% static 'htmx/images/practice-right.png' %}" alt="Placeholder right image">
            </div>
        </div>
    </main>
</body>
</html>
