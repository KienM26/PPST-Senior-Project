{% load static %}
<!DOCTYPE html>
<html lang="{{ lang_info.code|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.title }}</title>
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">
    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
        }
    </style>
</head>

<body class="accessibility-page">
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>
        <h1 class="title">{{ text.title }}</h1>
        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <h2 class="prompt">{{ text.prompt }}</h2>

        <form method="post" action="{% url 'htmx:saveAccessibility' %}" class="color-card" id="accessibilityForm">
            {% csrf_token %}
            <input type="hidden" name="lang" value="{{ lang }}">
            <input type="hidden" name="theme" id="themeInput" value="{{ selected_theme }}">

            <div class="swatches">
                <button type="button" class="swatch {% if selected_theme == 'teal' %}selected{% endif %}"
                    data-theme="teal" style="background:#0f9db7;" aria-label="Teal"></button>
                <button type="button" class="swatch {% if selected_theme == 'orange' %}selected{% endif %}"
                    data-theme="orange" style="background:#f7924a;" aria-label="Orange"></button>
                <button type="button" class="swatch {% if selected_theme == 'navy' %}selected{% endif %}"
                    data-theme="navy" style="background:#075787;" aria-label="Navy"></button>
                <button type="button" class="swatch {% if selected_theme == 'purple' %}selected{% endif %}"
                    data-theme="purple" style="background:#9b69de;" aria-label="Purple"></button>
            </div>

            <div class="controls-row">
                <div class="button-stack">
                    <button type="button" class="btn change-btn" id="changeBtn">{{ text.change }}</button>
                    <button type="submit" class="btn continue-btn">{{ text.continue }}</button>
                </div>

                <div class="speaker-wrap" onclick="playAudio('Accessibility')" style="cursor:pointer;">
                    <img src="{% static 'htmx/images/speaker.png' %}" alt="Audio icon">
                </div>
            </div>

            <div class="helper-text" id="helperText">Selected theme: {{ current_theme.name }}</div>
        </form>
    </main>

    <script>
        const themeInput = document.getElementById("themeInput");
        const swatches = document.querySelectorAll(".swatch");
        const changeBtn = document.getElementById("changeBtn");
        const helperText = document.getElementById("helperText");
        const root = document.documentElement;

        const themeMap = {
            teal: { header: "#0f9db7", button: "#0f9db7", name: "Teal" },
            orange: { header: "#f7924a", button: "#f7924a", name: "Orange" },
            navy: { header: "#075787", button: "#075787", name: "Navy" },
            purple: { header: "#9b69de", button: "#9b69de", name: "Purple" }
        };

        let chosenTheme = themeInput.value;

        function markSelected(themeName) {
            swatches.forEach((swatch) => {
                swatch.classList.toggle("selected", swatch.dataset.theme === themeName);
            });
            themeInput.value = themeName;
            chosenTheme = themeName;
        }

        function applyTheme(themeName) {
            const theme = themeMap[themeName];
            if (!theme) return;

            root.style.setProperty("--theme-color", theme.header);
            root.style.setProperty("--button-color", theme.button);
            helperText.textContent = `Selected theme: ${theme.name}`;
        }

        swatches.forEach((swatch) => {
            swatch.addEventListener("click", function () {
                markSelected(this.dataset.theme);
            });
        });

        changeBtn.addEventListener("click", function () {
            applyTheme(chosenTheme);
        });

        applyTheme(chosenTheme);
    </script>

    <script>
function playAudio(baseName) {
    const langValue = "{{ lang|default:'en' }}";
    const lang = langValue === "es" ? "spanish" : "english";

    const voice = localStorage.getItem("selectedVoice") || "female";

    let fileName = "";

    if (lang === "english" && voice === "female") {
        fileName = baseName + ".mp3";   // Accessibility.mp3
    } else if (lang === "english" && voice === "male") {
        fileName = baseName + "1.mp3";  // Accessibility1.mp3
    } else if (lang === "spanish" && voice === "female") {
        fileName = baseName + "2.mp3";  // Accessibility2.mp3
    } else if (lang === "spanish" && voice === "male") {
        fileName = baseName + "3.mp3";  // Accessibility3.mp3
    }

    const audioPath = `/static/htmx/audio/${lang}/${voice}/${fileName}`;
    const audio = new Audio(audioPath);
    audio.currentTime = 0;
    audio.play();
}
</script>
</body>

</html>
