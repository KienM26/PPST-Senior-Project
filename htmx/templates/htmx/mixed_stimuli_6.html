{% load static %}
<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ text.page_title|default:"Mixed Stimuli 6" }}</title>

<link rel="stylesheet" href="{% static 'htmx/external.css' %}">

<style>
:root {
    --theme-color: {{ current_theme.header|default:"#0f9db7" }};
    --button-color: {{ current_theme.button|default:"#0f9db7" }};
    --page-bg: #efeded;
    --panel-bg: #ffffff;
    --text-dark: #111111;
}

.stimulus-panel{
    background: var(--panel-bg);
    border: 1px solid #999;
    border-radius: 6px;
    max-width: 1100px;
    margin: 30px auto;
    padding: 80px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.sequence-box{
    width:400px;
    height:400px;
    border:2px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:120px;
    font-weight:600;
    text-align:center;
    line-height:1.2;
}

@media (max-width: 700px){
    .sequence-box{
        width:280px;
        height:280px;
        font-size:80px;
    }
}
</style>

</head>

<body style="background: var(--page-bg);">

<header class="top-bar">
    <div class="logo-wrap">
        <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
    </div>

    <h1 class="title">{{ text.title }} 6</h1>

    <div  class="speaker-wrap" style="cursor:pointer;">
        <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
    </div>

    <div class="lang-badge">
        {{ lang_info.label }}
        <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
    </div>
</header>

<div class="gray-line"></div>

<main class="stimulus-panel">
    <div class="sequence-box" id="sequence-box"></div>
</main>

<script>
    const sequence = ["4", "6", "H", "1", "E"];
    let index = 0;

    function convertToAudioName(item) {
        if (item === "1") return "one";
        if (item === "2") return "two";
        if (item === "3") return "three";
        if (item === "4") return "four";
        if (item === "5") return "five";
        if (item === "6") return "six";
        if (item === "7") return "seven";
        if (item === "8") return "eight";
        if (item === "9") return "nine";

        return item.toLowerCase(); // handles letters like H, E
    }

    let audioUnlocked = false;

    function unlockAudio() {
        if (!audioUnlocked) {
            const audio = new Audio();
            audio.play().catch(() => {});
            audioUnlocked = true;
        }
    }

    function showNext() {
        const box = document.getElementById("sequence-box");

        if (index < sequence.length) {
            const item = sequence[index];
            box.textContent = item;

            const name = convertToAudioName(item);
            playAudio(name);

            index++;
            setTimeout(showNext, 2000);
        } else {
            window.location.href = "{% url 'htmx:mixedStimuli6Response' %}?lang={{ lang|default:'en' }}";
        }
    }

    window.onload = () => {
        unlockAudio();
        setTimeout(showNext, 500);
    };
</script>

<script>
function playAudio(baseName) {
    const langValue = "{{ lang|default:'en' }}";
    const lang = langValue === "es" ? "spanish" : "english";

    const voice = localStorage.getItem("selectedVoice") || "female";

    let fileName = "";

    if (lang === "english" && voice === "female") fileName = baseName + ".mp3";
    if (lang === "english" && voice === "male") fileName = baseName + "1.mp3";
    if (lang === "spanish" && voice === "female") fileName = baseName + "2.mp3";
    if (lang === "spanish" && voice === "male") fileName = baseName + "3.mp3";

    const audioPath = `/static/htmx/audio/${lang}/${voice}/${fileName}`;
    const audio = new Audio(audioPath);
    audio.currentTime = 0;
    audio.play();
}
</script>

</body>
</html>
