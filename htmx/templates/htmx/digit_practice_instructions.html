{% load static %}
<!-- Ella Marino 3/10/2026 -->

<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.page_title|default:"Test Instructions" }}</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <!-- Dynamic Theme Variables -->
    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
            --page-bg: #efeded;
            --panel-bg: #c9c4c4;
            --text-dark: #111111;
        }

        @media (max-width: 900px) {
            .title { font-size: 44px; }
        }

        @media (max-width: 700px) {
            .top-bar { 
                flex-wrap: wrap;
                justify-content: center;
                height: auto;
                padding: 12px 16px;
            }
            .title { font-size: 38px; margin: 8px 0; text-align: center; flex: 1; }
        }
    </style>
</head>
<body style="background: var(--page-bg);">

<header class="top-bar">
    <div class="logo-wrap">
        <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
    </div>

    <h1 class="title">
        {{ text.page_title|default:"Test Instructions" }}
    </h1>
</header>

<div class="gray-line"></div>

<main class="page-content">
    <h2 style="text-align:center;">
        {{ text.intro_heading|default:"Watch the Instructions" }}
    </h2>

    <!-- VIDEO SECTION -->
    <div style="display:flex; justify-content:center; margin:30px 0;">
        <video width="640" height="360" controls autoplay>
            <source src="{% static 'htmx/videos/test_instructions_video1.mp4' %}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <form method="post" action="{% url 'htmx:practiceTestNext' %}" style="display:flex; justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn continue-btn">
            {{ text.intro_button|default:"Next" }}
        </button>
    </form>
</main>

</body>
</html>
