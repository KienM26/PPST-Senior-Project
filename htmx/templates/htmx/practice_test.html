{% load static %}
<!DOCTYPE html>
<html lang="{{ lang_info.code|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPST Practice Test</title>
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">
    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
            --border-color: {{ current_theme.button|default:"#0f9db7" }};
        }
    </style>
</head>

<body class="practice-test-page">
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }}</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <form method="get" action="{% url 'htmx:selectVoice' %}" class="practice-test-form">
                    <input type="hidden" name="lang" value="en">
                    <button type="submit" class="btn">{{ text.btn }}</button>
                </form>
        <div class="placeholder-row">
            <div class="placeholder-box placeholder-small">
                <img src="{% static 'htmx/images/practice-left.png' %}" alt="Placeholder left image">
            </div>
            <div class="placeholder-box placeholder-large">
                <img src="{% static 'htmx/images/practice-right.png' %}" alt="Placeholder right image">
            </div>
        </div>
    </main>
</body>

</html>
