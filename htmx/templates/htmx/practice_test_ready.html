{% load static %}
<!DOCTYPE html>
<html lang="{{ lang_info.code|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.title }}</title>
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">
    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }}</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <div class="panel">
            <h2>{{ text.practice_heading }}</h2>

            <div class="instructions">
                {% for line in text.practice_body %}
                    <div>{{ line }}</div>
                {% endfor %}
            </div>

            <form method="post" action="{% url 'htmx:startPracticeTest' %}">
                {% csrf_token %}
                <button type="submit" class="btn">{{ text.practice_button }}</button>
            </form>
        </div>
    </main>
</body>
</html>
