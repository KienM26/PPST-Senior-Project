{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPST Home</title>

    <link rel="stylesheet" href="{% static 'htmx/doctorportal.css' %}">
</head>

<body class="page">

    <!-- NAVBAR (FULL WIDTH) -->
    <header class="navbar">
        <div class="nav-left">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST Logo">
        </div>

        <nav class="nav-right">
            <a href="{% url 'htmx:home' %}" class="nav-active">Home</a>
            <a href="{% url 'htmx:doctor_login' %}">Login</a>
            <a href="{% url 'htmx:doctor_create_account' %}">Create Account</a>
            <a href="{% url 'htmx:doctor_about' %}">About</a>
        </nav>
    </header>


    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- HERO -->
        <section class="hero">
            <div class="hero-text">
                <h1>The Philadelphia <br> Pointing Span Test</h1>
            </div>

            <div class="hero-image">
                <img src="https://via.placeholder.com/400x250">
            </div>
        </section>
    <!-- INDEPENDENT TEST BUTTON -->
    <section class="hero-buttons">
        <form method="post" action="{% url 'htmx:startIndependentTest' %}">
            {% csrf_token %}
            <button type="submit" class="btn-primary">
                Try Independent Test
            </button>
        </form>
    </section>
        <!-- IMAGES -->
        <section class="image-row">
            <div class="image-card small">
                <img src="https://via.placeholder.com/300x200">
            </div>

            <div class="image-card large">
                <img src="https://via.placeholder.com/600x200">
            </div>
        </section>

    </main>

</body>

</html>
