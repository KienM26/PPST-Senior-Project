{% load static %}
<!DOCTYPE html>
<html lang="{{ lang_info.code|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.title }}</title>

    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};     
        }
    </style>
</head>

<body class="select-voice-page">

    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }}</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">

        <form method="post" action="{% url 'htmx:saveVoice' %}">
            {% csrf_token %}

            <input type="hidden" name="voice" id="voiceInput" value="{{ selected_voice|default:'female' }}">

            <div class="voice-grid">

                <!-- Female -->
                <div class="voice-card">

                    <div class="voice-image-box">
                        <img src="{% static 'htmx/images/voice-female.jpg' %}" alt="Female voice">
                    </div>

                    <button type="button"
                        class="btn voice-option {% if selected_voice == 'female' or not selected_voice %}selected{% endif %}"
                        data-voice="female">
                        {{ text.female }}
                    </button>

                </div>

                <!-- Male -->
                <div class="voice-card">

                    <div class="voice-image-box">
                        <img src="{% static 'htmx/images/voice-male.jpg' %}" alt="Male voice">
                    </div>

                    <button type="button" class="btn voice-option {% if selected_voice == 'male' %}selected{% endif %}"
                        data-voice="male">
                        {{ text.male }}
                    </button>

                </div>

            </div>

            <div class="next-wrap">
                <button type="submit" class="btn">{{ text.btn }}</button>
            </div>

        </form>

    </main>

</body>

<script>
    const buttons = document.querySelectorAll('.voice-option');
    const input = document.getElementById('voiceInput');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('selected'));

            btn.classList.add('selected');

            input.value = btn.dataset.voice;
        });
    });
</script>

</html>
