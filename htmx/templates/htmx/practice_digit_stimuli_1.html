{% load static %}
<!-- Fiona 3/12/2026 -->
<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ text.title }} 1</title>

    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};     
        }
    </style>

</head>

<body class="digit-stimuli-response-page">

    <header class="top-bar">

        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }} 1</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>

    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <div class="sequence-box">
            {{ text.sequence }}
        </div>

        <form method="get" action="{% url 'htmx:practiceDigitStimuli1Response' %}">
            <button type="submit" class="btn centered">
                {{ text.next }}
            </button>
        </form>
    </main>

</body>

</html>
