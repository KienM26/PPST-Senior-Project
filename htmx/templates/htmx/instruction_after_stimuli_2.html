{% load static %}


<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.page_title|default:"Test Instructions" }}</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <!-- Dynamic Theme Variables -->
    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
            --page-bg: #efeded;
            --panel-bg: #c9c4c4;
            --text-dark: #111111;
        }

        @media (max-width: 900px) {
            .title { font-size: 44px; }
        }

        @media (max-width: 700px) {
            .top-bar { 
                flex-wrap: wrap;
                justify-content: center;
                height: auto;
                padding: 12px 16px;
            }
            .title { font-size: 38px; margin: 8px 0; text-align: center; flex: 1; }
        }
    </style>
</head>
<body style="background: var(--page-bg);">

<header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }}</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

<div class="gray-line"></div>

    <main class="page-content">
        <div class="panel">
            <h2>Digital Stimuli Test</h2>

            <div class="instructions">
                
                    <div>YOU ARE ABOUT TO BEGIN THE PPST TEST</div>
                
                    <div> WITH DIGIT STIMULI. PLEASE CHOOSE THE START  </div>
                
                    <div>TEST BUTTON WHEN YOU ARE READY TO BEGIN</div>
                
                
            </div>

            <form method="get" action="{% url 'htmx:digitStimuli1' %}">
            {% csrf_token %}
            <button type="submit" class="btn">Start Test</button>
            </form>
        </div>
    </main>


</body></html>
