{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Doctor Account</title>

    <link rel="stylesheet" href="{% static 'htmx/doctorportal.css' %}">
</head>

<body class="page">

    <!-- NAVBAR (FULL WIDTH) -->
    <header class="navbar">
        <div class="nav-left">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST Logo">
        </div>

        <!-- NO NAVIGATION FOR CREATE ACCOUNT PAGE -->
    </header>


    <!-- MAIN CONTENT -->
    <main class="main-content">

        <section class="login-section">

            <!-- LEFT COLUMN: Login -->
            <div class="login-left">
                <h1>Create Account</h1>
                <p class="subtitle">
                    Already have a PPST account? <a href="{% url 'htmx:doctor_login' %}">Sign in</a>
                </p>

                <p class="subtitle">
                    <span class="required-asterisk">*</span> Indicates a required field
                </p>

                <form method="post" action="#" class="login-form">
                    {% csrf_token %}
                    <label class="form-row-label">Full Name</span></label>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="first_name" name="first_name" required>
                            <label for="first_name">First Name <span class="required-asterisk">*</span></label>
                        </div>
                        <div class="form-group">
                            <input type="text" id="middle_name" name="middle_name">
                            <label for="middle_name">Middle Name</label>
                        </div>
                        <div class="form-group">
                            <input type="text" id="last_name" name="last_name" required>
                            <label for="last_name">Last Name <span class="required-asterisk">*</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address <span class="required-asterisk">*</span></label>
                        <input type="email" id="email" name="email" placeholder="ex: myname@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="hospital">Hospital/Organization Name</label>
                        <input type="text" id="hospital" name="hospital">
                    </div>
                    <div class="form-group">
                        <label for="practice">Doctor's Office/Practice Name</label>
                        <input type="text" id="practice" name="practice">
                    </div>
                    <div class="form-group">
                        <label for="license">Medical License Number <span class="required-asterisk">*</span></label>
                        <input type="text" id="license" name="license" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username <span class="required-asterisk">*</span></label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password <span class="required-asterisk">*</span></label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="password_confirm">Password Confirmation <span
                                class="required-asterisk">*</span></label>
                        <input type="password" id="password_confirm" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn">Submit</button>
                </form>
            </div>

            <!-- RIGHT COLUMN: Placeholder Image -->
            <div class="login-right">
                <img src="https://via.placeholder.com/500x400" alt="Create Account illustration">
            </div>

        </section>

    </main>

</body>

</html>
