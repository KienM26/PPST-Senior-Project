{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'htmx/doctorportal.css' %}">
</head>

<body class="page forgot-password-page">

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-left">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST Logo">
        </div>

        <!-- NO NAVIGATION FOR FORGOT PASSWORD PAGE -->
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <section style="display: flex; min-height: 100%; align-items: center; justify-content: center;">

            <div
                style="width: 100%; max-width: 440px; padding: 48px 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);">

                <h1 style="font-size: 1.8rem; font-weight: 700; margin-bottom: 8px;">Forgot Password</h1>
                <p style="color: #555; margin-bottom: 28px;">
                    Enter your email address and we'll send you a link to reset your password.
                </p>

                <form method="post" action="#" style="display: flex; flex-direction: column; gap: 16px;">
                    {% csrf_token %}
                    <div style="display: flex; flex-direction: column; gap: 4px;">
                        <label for="email" style="font-weight: 600; font-size: 0.9rem;">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email"
                            style="padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; background: #fff;">
                    </div>
                    <button type="submit"
                        style="padding: 12px; background-color: #0f9db7; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px;">
                        Send Reset Link
                    </button>
                </form>

                <p style="margin-top: 24px; color: #555; font-size: 0.9rem;">
                    Remember your password?
                    <a href="{% url 'htmx:doctor_login' %}"
                        style="color: #0f9db7; text-decoration: none; font-weight: 600;">Back to Login</a>
                </p>

            </div>

        </section>

    </main>

</body>

</html>
