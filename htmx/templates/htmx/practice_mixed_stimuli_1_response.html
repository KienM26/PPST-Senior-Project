{% load static %}
<!-- Fiona Lockhart 3/12/2026 -->
<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ text.title_mixed_response }} 1</title>

    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
        }
    </style>
</head>

<body class="mixed-stimuli-response-page">

    <header class="top-bar">

        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}">
        </div>

       <h1 class="title">{{ text.title_response }} 1</h1>

        <div class="speaker-wrap" onclick="playAudio('Practice_Mixed_Response_1')" style="cursor:pointer;">
            <img src="{% static 'htmx/images/speaker.png' %}">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}">
        </div>

    </header>

    <div class="gray-line"></div>

    <main class="response-panel">

        <div class="prompt-box">
            {{ text.prompt }}
        </div>

        <form method="get" action="{% url 'htmx:practiceMixedStimuli2' %}">
            {% csrf_token %}

            <input type="hidden" name="response" id="response">
            <input type="hidden" name="lang" value="{{ lang|default:'en' }}">
        <div class="keypad-container">
            <div class="keypad">

                <button type="button" class="key" onclick="press(1)">1</button>
                <button type="button" class="key" onclick="press(2)">2</button>
                <button type="button" class="key" onclick="press(3)">3</button>

                <button type="button" class="key" onclick="press(4)">4</button>
                <button type="button" class="key" onclick="press(5)">5</button>
                <button type="button" class="key" onclick="press(6)">6</button>

                <button type="button" class="key" onclick="press(7)">7</button>
                <button type="button" class="key" onclick="press(8)">8</button>
                <button type="button" class="key" onclick="press(9)">9</button>

            </div>

            <div class="keypad">

                <button type="button" class="key" onclick="press('A')">A</button>
                <button type="button" class="key" onclick="press('B')">B</button>
                <button type="button" class="key" onclick="press('C')">C</button>

                <button type="button" class="key" onclick="press('D')">D</button>
                <button type="button" class="key" onclick="press('E')">E</button>
                <button type="button" class="key" onclick="press('F')">F</button>

                <button type="button" class="key" onclick="press('G')">G</button>
                <button type="button" class="key" onclick="press('H')">H</button>
                <button type="button" class="key" onclick="press('I')">I</button>

            </div>

            <div class="submit-wrap">
                <button class="btn">{{ text.submit }}</button>
            </div>

        </div>

        </form>

    </main>

    <script> 
        let answer = [];

        function speakInput(value) {
        const langValue = "{{ lang|default:'en' }}";
        const isSpanish = langValue === "es";

        const namesEn = {
            1: "one",
            2: "two",
            3: "three",
            4: "four",
            5: "five",
            6: "six",
            7: "seven",
            8: "eight",
            9: "nine",
            A: "a",
            B: "b",
            C: "c",
            D: "d",
            E: "e",
            F: "f",
            G: "g",
            H: "h",
            I: "i"
        };

        const namesEs = {
            1: "uno",
            2: "dos",
            3: "tres",
            4: "cuatro",
            5: "cinco",
            6: "seis",
            7: "siete",
            8: "ocho",
            9: "nueve",
            A: "a",
            B: "b",
            C: "c",
            D: "d",
            E: "e",
            F: "f",
            G: "g",
            H: "h",
            I: "i"
        };

        const textToSpeak = isSpanish ? namesEs[value] : namesEn[value];

        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = isSpanish ? "es-ES" : "en-US";
        utterance.rate = 0.9;

        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }

    function press(value) {
        answer.push(value);
        document.getElementById("response").value = answer.join("");
        speakInput(value);
    }
    </script>
<script>
    function playAudio(baseName) {
    const langValue = "{{ lang|default:'en' }}";
    const lang = langValue === "es" ? "spanish" : "english";

    const voice = localStorage.getItem("selectedVoice") || "female";

    let fileName = "";

    if (lang === "english" && voice === "female") fileName = baseName + ".mp3";
    if (lang === "english" && voice === "male") fileName = baseName + "1.mp3";
    if (lang === "spanish" && voice === "female") fileName = baseName + "2.mp3";
    if (lang === "spanish" && voice === "male") fileName = baseName + "3.mp3";

    const audioPath = `/static/htmx/audio/${lang}/${voice}/${fileName}`;
    const audio = new Audio(audioPath);
    audio.currentTime = 0;
    audio.play();
}
</script>
</body>

</html>
