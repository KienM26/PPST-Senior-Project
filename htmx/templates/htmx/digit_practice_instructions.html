{% load static %}
<!-- Ella Marino 3/10/2026 -->

<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.page_title|default:"Test Instructions" }}</title>

    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
            --page-bg: #efeded;
            --panel-bg: #c9c4c4;
            --text-dark: #111111;
        }

        @media (max-width: 900px) {
            .title { font-size: 44px; }
        }

        @media (max-width: 700px) {
            .top-bar {
                flex-wrap: wrap;
                justify-content: center;
                height: auto;
                padding: 12px 16px;
            }

            .title {
                font-size: 38px;
                margin: 8px 0;
                text-align: center;
                flex: 1;
            }
        }
    </style>
</head>
<body style="background: var(--page-bg);">

    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }}</h1>

        <div class="speaker-wrap" onclick="playAudio('Test_Instructions')" style="cursor:pointer;">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <h2 class="prompt">
            {{ text.intro_heading|default:"Watch the Instructions" }}
        </h2>

        <div>
            <video class="video" id="instructionVideo" controls autoplay>
                <source src="{% static 'htmx/video/test_instructions_video1.mp4' %}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <form method="get" action="{% url 'htmx:practiceDigitStimuli1' %}" style="display:flex; justify-content:center;">
            <button type="submit" class="btn centered" id="nextBtn" disabled>
                {{ text.intro_button|default:"Next" }}
            </button>
        </form>
    </main>

    <script>
    const video = document.getElementById('instructionVideo');
    const nextBtn = document.getElementById('nextBtn');

    video.addEventListener('ended', () => {
        nextBtn.disabled = false;
    });
</script>

    <script>
function playAudio(baseName) {
    const langValue = "{{ lang|default:'en' }}";
    const lang = langValue === "es" ? "spanish" : "english";

    const voice = localStorage.getItem("selectedVoice") || "female";

    let fileName = "";

    if (lang === "english" && voice === "female") {
        fileName = baseName + ".mp3";
    } else if (lang === "english" && voice === "male") {
        fileName = baseName + "1.mp3";
    } else if (lang === "spanish" && voice === "female") {
        fileName = baseName + "2.mp3";
    } else if (lang === "spanish" && voice === "male") {
        fileName = baseName + "3.mp3";
    }

    const audioPath = `/static/htmx/audio/${lang}/${voice}/${fileName}`;
    const audio = new Audio(audioPath);
    audio.currentTime = 0;
    audio.play();
}
</script>

</body>

</html>
