{% load static %}
<!-- Fiona Lockhart 3/12/2026 -->
<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ text.title_response }} 5</title>

    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">

    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
        }
    </style>
</head>

<body class="digit-stimuli-response-page">

    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title_response }} 5</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="response-panel">

        <div class="prompt-box">
            {{ text.prompt }}
        </div>

        <form method="get" action="{% url 'htmx:digitStimuli6' %}" onsubmit="saveAndContinue()">
            <input type="hidden" name="response" id="response">

            <div class="keypad">

                <button type="button" class="key" onclick="press(1)">1</button>
                <button type="button" class="key" onclick="press(2)">2</button>
                <button type="button" class="key" onclick="press(3)">3</button>

                <button type="button" class="key" onclick="press(4)">4</button>
                <button type="button" class="key" onclick="press(5)">5</button>
                <button type="button" class="key" onclick="press(6)">6</button>

                <button type="button" class="key" onclick="press(7)">7</button>
                <button type="button" class="key" onclick="press(8)">8</button>
                <button type="button" class="key" onclick="press(9)">9</button>

            </div>

            <div class="submit-wrap">
                <button type="submit" class="btn">{{ text.submit }}</button>
            </div>

        </form>

    </main>

    <script src="{% static 'htmx/test_response_buffer.js' %}"></script>
    <script>
        ppstTestBuffer.startCapture();

        function press(num) {
            ppstTestBuffer.press(num);
        }

        function saveAndContinue() {
            ppstTestBuffer.saveCurrentResponse("digit_stimuli_5", "digit");
        }
    </script>

</body>

</html>
