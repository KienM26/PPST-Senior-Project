{% load static %}
<!DOCTYPE html>
<html lang="{{ lang|default:'en' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPST Practice Test</title>
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">
    <style>
        :root {
            --theme-color: {{ current_theme.header|default:"#0f9db7" }};
            --button-color: {{ current_theme.button|default:"#0f9db7" }};
        }
    </style>
</head>

<body class="practice-test-page">
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">{{ text.title }}</h1>

        <div class="speaker-wrap" onclick="playAudio('Main_Landing')" style="cursor:pointer;">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Speaker icon">
        </div>

        <div class="lang-badge">
            {{ lang_info.label }}
            <img src="{% static lang_info.flag %}" alt="{{ lang_info.label }} flag">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <form method="get" action="{% url 'htmx:selectVoice' %}" class="practice-test-form">
            <input type="hidden" name="lang" value="{{ lang|default:'en' }}">
            <button type="submit" class="btn">{{ text.btn }}</button>
        </form>
        <div class="placeholder-row">
            <div class="placeholder-box placeholder-small">
                <img src="{% static 'htmx/images/practice-left.jpg' %}" alt="Placeholder left image">
            </div>
            <div class="placeholder-box placeholder-large">
                <img src="{% static 'htmx/images/practice-right.jpg' %}" alt="Placeholder right image">
            </div>
        </div>
    </main>
    
    <script>
function playAudio(baseName) {
    const badgeText = document.querySelector(".lang-badge")?.innerText.toLowerCase() || "";
    const lang = badgeText.includes("es") ? "spanish" : "english";

    const voice = localStorage.getItem("selectedVoice") || "female";

    let fileName = "";

    if (lang === "english" && voice === "female") fileName = baseName + ".mp3";
    if (lang === "english" && voice === "male") fileName = baseName + "1.mp3";
    if (lang === "spanish" && voice === "female") fileName = baseName + "2.mp3";
    if (lang === "spanish" && voice === "male") fileName = baseName + "3.mp3";

    const audio = new Audio(`/static/htmx/audio/${lang}/${voice}/${fileName}`);
    audio.play();
}
</script>
</body>

</html>
