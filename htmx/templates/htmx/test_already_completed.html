{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Already Completed</title>
    <link rel="stylesheet" href="{% static 'htmx/doctorportal.css' %}">
    <style>
        .error-card {
            max-width: 520px;
            margin: 80px auto;
            text-align: center;
            padding: 2.5rem 2rem;
        }
        .error-card h1 { margin-bottom: 1rem; }
        .error-card p  { margin-bottom: 1.5rem; color: #555; }
    </style>
</head>
<body class="page">
    <header class="navbar">
        <div class="nav-left">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST Logo">
        </div>
    </header>
    <main class="main-content">
        <article class="portal-card error-card">
            <h1>Test Already Completed</h1>
            <p>
                This test has already been submitted. Each test link can only be used once.
                Please contact your healthcare provider if you believe this is an error.
            </p>
            <p><strong>Test ID:</strong> {{ test.id }}</p>
        </article>
    </main>
</body>
</html>
