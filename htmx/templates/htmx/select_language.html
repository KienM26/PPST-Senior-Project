{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language</title>
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">
    <style>
        

        @media (max-width: 900px) {
            .top-bar {
                padding: 0 20px;
                gap: 10px;
            }

            .title {
                font-size: 34px;
            }

            .speaker-wrap img {
                height: 56px;
            }

            .cards {
                gap: 40px;
            }
        }

        @media (max-width: 640px) {
            .top-bar {
                height: auto;
                padding: 18px 14px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .logo-wrap,
            .speaker-wrap {
                width: 100%;
                justify-content: center;
                display: flex;
            }

            .title {
                order: 2;
                width: 100%;
                font-size: 30px;
                margin: 8px 0;
            }

            .logo-wrap {
                order: 1;
            }

            .speaker-wrap {
                order: 3;
            }

            .language-card {
                width: 100%;
                max-width: 300px;
            }

            .language-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="select-language-page">
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>

        <h1 class="title">Select Your Language</h1>

        <div class="speaker-wrap">
            <img src="{% static 'htmx/images/speaker.png' %}" alt="Audio icon">
        </div>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <section class="cards">
            <div class="language-card">
                <div class="flag-wrap">
                    <img src="{% static 'htmx/images/flag-mexico.png' %}" alt="Mexican flag">
                </div>
                <form method="get" action="{% url 'htmx:Accessibility' %}" class="language-form">
                    <input type="hidden" name="lang" value="es">
                    <button type="submit" class="btn">Espa&ntilde;ol</button>
                </form>
            </div>

            <div class="language-card">
                <div class="flag-wrap">
                    <img src="{% static 'htmx/images/flag-usa.png' %}" alt="English flag">
                </div>
                <form method="get" action="{% url 'htmx:Accessibility' %}" class="language-form">
                    <input type="hidden" name="lang" value="en">
                    <button type="submit" class="btn">English</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
