{% load static %}
<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.title }}</title>
    <link rel="stylesheet" href="{% static 'htmx/external.css' %}">
    <style>

        @media (max-width: 900px) {
            .page-title {
                font-size: 44px;
            }

            .prompt {
                font-size: 30px;
            }
        }

        @media (max-width: 700px) {
            .top-bar {
                height: auto;
                padding: 20px 16px;
            }

            .logo-wrap {
                position: static;
                transform: none;
                margin-right: 14px;
            }

            .top-bar {
                justify-content: flex-start;
                gap: 12px;
            }

            .page-title {
                font-size: 38px;
            }

            .controls-row {
                flex-direction: column;
            }

            .speaker-wrap img {
                width: 90px;
            }

            .button-stack {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body class="accessibility-page">
    <header class="top-bar">
        <div class="logo-wrap">
            <img src="{% static 'htmx/images/ppst-logo.png' %}" alt="PPST logo">
        </div>
        <h1 class="title">{{ text.title }}</h1>
    </header>

    <div class="gray-line"></div>

    <main class="page-content">
        <h2 class="prompt">{{ text.prompt }}</h2>

        <form method="post" action="{% url 'htmx:saveAccessibility' %}" class="color-card" id="accessibilityForm">
            {% csrf_token %}
            <input type="hidden" name="lang" value="{{ lang }}">
            <input type="hidden" name="theme" id="themeInput" value="{{ selected_theme }}">

            <div class="swatches">
                <button type="button" class="swatch {% if selected_theme == 'teal' %}selected{% endif %}" data-theme="teal" style="background:#0f9db7;" aria-label="Teal"></button>
                <button type="button" class="swatch {% if selected_theme == 'orange' %}selected{% endif %}" data-theme="orange" style="background:#f7924a;" aria-label="Orange"></button>
                <button type="button" class="swatch {% if selected_theme == 'navy' %}selected{% endif %}" data-theme="navy" style="background:#075787;" aria-label="Navy"></button>
                <button type="button" class="swatch {% if selected_theme == 'purple' %}selected{% endif %}" data-theme="purple" style="background:#9b69de;" aria-label="Purple"></button>
            </div>

            <div class="controls-row">
                <div class="button-stack">
                    <button type="button" class="btn change-btn" id="changeBtn">{{ text.change }}</button>
                    <button type="submit" class="btn continue-btn">{{ text.continue }}</button>
                </div>

                <div class="speaker-wrap">
                    <img src="{% static 'htmx/images/speaker.png' %}" alt="Audio icon">
                </div>
            </div>

            <div class="helper-text" id="helperText">Selected theme: {{ current_theme.name }}</div>
        </form>
    </main>

    <script>
        const themeInput = document.getElementById("themeInput");
        const swatches = document.querySelectorAll(".swatch");
        const changeBtn = document.getElementById("changeBtn");
        const helperText = document.getElementById("helperText");
        const root = document.documentElement;

        const themeMap = {
            teal:   { header: "#0f9db7", button: "#0f9db7", name: "Teal" },
            orange: { header: "#f7924a", button: "#f7924a", name: "Orange" },
            navy:   { header: "#075787", button: "#075787", name: "Navy" },
            purple: { header: "#9b69de", button: "#9b69de", name: "Purple" }
        };

        let chosenTheme = themeInput.value;

        function markSelected(themeName) {
            swatches.forEach((swatch) => {
                swatch.classList.toggle("selected", swatch.dataset.theme === themeName);
            });
            themeInput.value = themeName;
            chosenTheme = themeName;
        }

        function applyTheme(themeName) {
            const theme = themeMap[themeName];
            if (!theme) return;

            root.style.setProperty("--theme-color", theme.header);
            root.style.setProperty("--button-color", theme.button);
            helperText.textContent = `Selected theme: ${theme.name}`;
        }

        swatches.forEach((swatch) => {
            swatch.addEventListener("click", function () {
                markSelected(this.dataset.theme);
            });
        });

        changeBtn.addEventListener("click", function () {
            applyTheme(chosenTheme);
        });

        applyTheme(chosenTheme);
    </script>
</body>
</html>
